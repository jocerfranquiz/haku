<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 600" font-family="ui-monospace, SFMono-Regular, 'JetBrains Mono', Menlo, Consolas, monospace">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#928374"/>
    </marker>
  </defs>

  <rect width="780" height="600" fill="#282828"/>

  <text x="390" y="38" text-anchor="middle" fill="#ebdbb2" font-size="18" font-weight="600">haku · architecture</text>
  <text x="390" y="58" text-anchor="middle" fill="#928374" font-size="11">single-user CLI · CPU-only · local SQLite</text>

  <!-- bash wrapper -->
  <rect x="230" y="86" width="320" height="62" rx="8" fill="#3c3836" stroke="#83a598" stroke-width="1.5"/>
  <text x="390" y="110" text-anchor="middle" fill="#83a598" font-size="13" font-weight="600">haku  (bash wrapper)</text>
  <text x="390" y="130" text-anchor="middle" fill="#a89984" font-size="11">resolves HAKU_HOME · exec .venv/bin/python</text>

  <line x1="390" y1="148" x2="390" y2="188" stroke="#928374" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="405" y="172" fill="#928374" font-size="10">HAKU_HOME · argv</text>

  <!-- dispatcher -->
  <rect x="110" y="194" width="560" height="118" rx="8" fill="#3c3836" stroke="#fabd2f" stroke-width="1.5"/>
  <text x="390" y="216" text-anchor="middle" fill="#fabd2f" font-size="13" font-weight="600">engine/haku.py — dispatcher</text>

  <g font-size="11" fill="#ebdbb2">
    <rect x="138" y="232" width="80" height="24" rx="5" fill="#504945"/>
    <text x="178" y="248" text-anchor="middle">init</text>
    <rect x="226" y="232" width="80" height="24" rx="5" fill="#504945"/>
    <text x="266" y="248" text-anchor="middle">index</text>
    <rect x="314" y="232" width="80" height="24" rx="5" fill="#504945"/>
    <text x="354" y="248" text-anchor="middle">search</text>
    <rect x="402" y="232" width="80" height="24" rx="5" fill="#504945"/>
    <text x="442" y="248" text-anchor="middle">status</text>
    <rect x="490" y="232" width="80" height="24" rx="5" fill="#504945"/>
    <text x="530" y="248" text-anchor="middle">purge</text>
    <rect x="578" y="232" width="80" height="24" rx="5" fill="#504945"/>
    <text x="618" y="248" text-anchor="middle">--version</text>
  </g>
  <text x="390" y="285" text-anchor="middle" fill="#a89984" font-size="11">shared: config · logging · DB handle · tokenizer · lock</text>

  <!-- arrows down to modules -->
  <line x1="195" y1="312" x2="195" y2="356" stroke="#928374" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="325" y1="312" x2="325" y2="356" stroke="#928374" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="455" y1="312" x2="455" y2="356" stroke="#928374" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="585" y1="312" x2="585" y2="356" stroke="#928374" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- module row (4 boxes, 120 wide each) -->
  <g>
    <rect x="135" y="356" width="120" height="68" rx="6" fill="#3c3836" stroke="#b8bb26" stroke-width="1.3"/>
    <text x="195" y="378" text-anchor="middle" fill="#b8bb26" font-size="12" font-weight="600">chunk.py</text>
    <text x="195" y="397" text-anchor="middle" fill="#a89984" font-size="10">~95 LoC splitter</text>
    <text x="195" y="412" text-anchor="middle" fill="#a89984" font-size="10">H2 + para pack</text>

    <rect x="265" y="356" width="120" height="68" rx="6" fill="#3c3836" stroke="#d3869b" stroke-width="1.3"/>
    <text x="325" y="378" text-anchor="middle" fill="#d3869b" font-size="12" font-weight="600">embed.py</text>
    <text x="325" y="397" text-anchor="middle" fill="#a89984" font-size="10">ONNX Runtime</text>
    <text x="325" y="412" text-anchor="middle" fill="#a89984" font-size="10">embed + rerank</text>

    <rect x="395" y="356" width="120" height="68" rx="6" fill="#3c3836" stroke="#8ec07c" stroke-width="1.3"/>
    <text x="455" y="378" text-anchor="middle" fill="#8ec07c" font-size="12" font-weight="600">storage.py</text>
    <text x="455" y="397" text-anchor="middle" fill="#a89984" font-size="10">SQLite + WAL</text>
    <text x="455" y="412" text-anchor="middle" fill="#a89984" font-size="10">vec · FTS5 · tx</text>

    <rect x="525" y="356" width="120" height="68" rx="6" fill="#3c3836" stroke="#fe8019" stroke-width="1.3"/>
    <text x="585" y="378" text-anchor="middle" fill="#fe8019" font-size="12" font-weight="600">tokenizer.py</text>
    <text x="585" y="397" text-anchor="middle" fill="#a89984" font-size="10">HF tokenizers</text>
    <text x="585" y="412" text-anchor="middle" fill="#a89984" font-size="10">Qwen3 BPE</text>
  </g>

  <!-- connectors to external resources (curved) -->
  <path d="M 325 424 C 325 452, 220 456, 220 482" fill="none" stroke="#665c54" stroke-width="1.2" stroke-dasharray="3,3" marker-end="url(#arrow)"/>
  <path d="M 455 424 C 455 452, 560 456, 560 482" fill="none" stroke="#665c54" stroke-width="1.2" stroke-dasharray="3,3" marker-end="url(#arrow)"/>

  <!-- external resources row: wider + two-line descriptions -->
  <g>
    <rect x="100" y="482" width="240" height="78" rx="6" fill="#1d2021" stroke="#d3869b" stroke-width="1.3" stroke-dasharray="4,3"/>
    <text x="220" y="506" text-anchor="middle" fill="#d3869b" font-size="12" font-weight="600">models/</text>
    <text x="220" y="528" text-anchor="middle" fill="#a89984" font-size="10">Qwen3-Embedding-0.6B</text>
    <text x="220" y="544" text-anchor="middle" fill="#a89984" font-size="10">bge-reranker-v2-m3 · ONNX INT8</text>

    <rect x="440" y="482" width="240" height="78" rx="6" fill="#1d2021" stroke="#8ec07c" stroke-width="1.3" stroke-dasharray="4,3"/>
    <text x="560" y="506" text-anchor="middle" fill="#8ec07c" font-size="12" font-weight="600">database.db</text>
    <text x="560" y="528" text-anchor="middle" fill="#a89984" font-size="10">files · chunks · vec_chunks</text>
    <text x="560" y="544" text-anchor="middle" fill="#a89984" font-size="10">fts_chunks (BM25)</text>
  </g>

  <!-- watermark -->
  <g opacity="0.35">
    <text x="764" y="576" text-anchor="end" fill="#ebdbb2" font-size="13" font-weight="700" letter-spacing="3">haku</text>
    <text x="764" y="590" text-anchor="end" fill="#928374" font-size="9" letter-spacing="2">Jocer Franquiz</text>
  </g>
</svg>
